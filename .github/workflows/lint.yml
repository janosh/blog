name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # use the project's pinned pnpm (packageManager field) via corepack
      - run: corepack enable && pnpm install

      - name: Lint and format check
        run: pnpm exec vp check

      - name: Svelte type check
        run: pnpm exec svelte-kit sync && pnpm exec svelte-check --threshold error
